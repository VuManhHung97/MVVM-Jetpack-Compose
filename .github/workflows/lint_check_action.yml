name: Lint Check
on: pull_request

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  CI: true

concurrency:
  group: 'ci-${{ github.head_ref }}-${{ github.workflow }}'
  cancel-in-progress: true

jobs:
  build:
    runs-on: [ 'self-hosted', 'linux', 'x64' ]
    steps:
      # When running on self-hosted GitHub Actions runners,
      # NodeJS must be previously installed with the version specified in the action.yml.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout
        uses: actions/checkout@v4.2.1

      - name: Set up Java JDK
        uses: actions/setup-java@v4.4.0
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.1.0

      - name: Assemble debug
        run: ./gradlew :app-mobile:assembleBaseDevDebug :app-tv:assembleBaseDevDebug --stacktrace

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'

      - name: Install bundler
        run: gem install bundler:2.3.3

      - name: Install dependencies
        run: bundle install

      - name: Run Danger
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bundle exec danger --verbose
